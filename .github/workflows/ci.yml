name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ai_sales_teammate
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_sales_teammate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: ""
      ANTHROPIC_VALIDATE_MODEL_ON_STARTUP: "false"
      APPROVAL_JOB_STALE_AFTER_SECONDS: "300"
      APPROVAL_WORKER_FAILURE_MODE: "none"
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: "lax"
      CORS_EXTRA_ORIGINS: "[]"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_sales_teammate
      ENVIRONMENT: test
      FRONTEND_ORIGIN: http://localhost:3000
      JWT_SECRET: ci-local-secret-change-me-32-chars-minimum
      LLM_ALLOW_MOCK_FALLBACK: "true"
      LLM_DECISION_TRACE_ENABLED: "true"
      LLM_EXPOSE_PROVIDER_THINKING_SUMMARY: "false"
      LLM_EXTENDED_THINKING_ENABLED: "false"
      LLM_MOCK_ENABLED: "true"
      LLM_PROVIDER: mock
      LLM_RUNTIME_SWITCHING_ENABLED: "false"
      LLM_STRUCTURED_OUTPUTS_ENABLED: "true"
      LLM_THINKING_BUDGET_TOKENS: "1024"
      LLM_THINKING_MODE: off
      MOCK_LLM_FAILURE_MODE: none
      REDIS_URL: redis://localhost:6379/0
      REVIEWER_INVITE_CODE: ci-reviewer-code-2026
      SIGNUP_DEMO_DATA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.5.13"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Lint backend
        working-directory: backend
        run: uv run ruff check app tests alembic

      - name: Test backend
        working-directory: backend
        run: uv run pytest

      - name: Compile backend
        working-directory: backend
        run: uv run python -m compileall app tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        env:
          BACKEND_API_URL: https://ai-sales-teammate-api.onrender.com
        run: pnpm build
